name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci
      - run: npm test
      - run: npm pack --dry-run
      - id: published
        name: Check npm version
        run: |
          package_spec=$(node -e "const p = require('./package.json'); console.log(`${p.name}@${p.version}`)")
          echo "package_spec=${package_spec}" >> "$GITHUB_OUTPUT"
          if npm view "$package_spec" version > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.published.outputs.exists != 'true'
        run: npm publish
      - if: steps.published.outputs.exists == 'true'
        run: echo "${{ steps.published.outputs.package_spec }} is already published; skipping npm publish."
