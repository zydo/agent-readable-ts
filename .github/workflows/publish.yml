name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci
      - run: npm test
      - name: Check tag matches package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          expected="v$(node -p "require('./package.json').version")"
          if [ "$RELEASE_TAG" != "$expected" ]; then
            echo "Tag ${RELEASE_TAG} does not match package version ${expected}."
            exit 1
          fi
      - run: npm pack --dry-run
      - run: npm pack
      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: package
          path: "*.tgz"

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      # Required for npm Trusted Publishing (OIDC).
      # Configure the trusted publisher on npm before the first tag push.
      id-token: write
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Download package artifact
        uses: actions/download-artifact@v8
        with:
          name: package
          path: dist/

      - name: Publish to npm
        run: npm publish ./dist/*.tgz

  github-release:
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v8
        with:
          name: package
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
